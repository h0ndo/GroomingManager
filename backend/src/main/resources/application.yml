server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: grooming-manager-backend
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:grooming_manager}
    username: ${DB_USER:grooming_manager}
    password: ${DB_PASSWORD:grooming_manager}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: ${SPRING_FLYWAY_ENABLED:false}
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${OIDC_JWK_SET_URI:http://localhost:3000/auth/realms/grooming-manager/protocol/openid-connect/certs}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:4200,http://localhost:3000}
  llm:
    enabled: ${LLM_ENABLED:false}
    base-url: ${LLM_BASE_URL:http://localhost:8081}
    model: ${LLM_MODEL:gemma-3-4b-it-qat-q4_0}
    vision-enabled: ${LLM_VISION_ENABLED:true}
