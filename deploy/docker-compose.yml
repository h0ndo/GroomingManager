# GroomingManager - production-style single-instance deployment
#
# Pro Kunde eine eigene Instanz mit Angular Frontend, Spring Boot Backend,
# Keycloak, PostgreSQL, Flyway-Migrationen und Nginx-Proxy.

services:
  proxy:
    image: nginx:1.27-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-grooming-manager}_proxy
    restart: unless-stopped
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_healthy
      keycloak:
        condition: service_started
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./nginx/templates:/etc/nginx/templates:ro
    environment:
      APP_DOMAIN: ${APP_DOMAIN}
    networks:
      - public
      - internal

  frontend:
    build:
      context: ../frontend
    image: ${FRONTEND_IMAGE:-grooming-manager-frontend:local}
    container_name: ${COMPOSE_PROJECT_NAME:-grooming-manager}_frontend
    restart: unless-stopped
    expose:
      - "80"
    networks:
      - internal

  backend:
    build:
      context: ../backend
    image: ${BACKEND_IMAGE:-grooming-manager-backend:local}
    container_name: ${COMPOSE_PROJECT_NAME:-grooming-manager}_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      keycloak:
        condition: service_started
    environment:
      SERVER_PORT: 8080
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_FLYWAY_ENABLED: "false"
      OIDC_ISSUER_URL: ${KEYCLOAK_PUBLIC_URL}/realms/${KEYCLOAK_REALM}
      OIDC_JWK_SET_URI: http://keycloak:8080/auth/realms/${KEYCLOAK_REALM}/protocol/openid-connect/certs
      APP_CORS_ALLOWED_ORIGINS: ${APP_PUBLIC_URL}
      LLM_ENABLED: ${LLM_ENABLED:-false}
      LLM_BASE_URL: ${LLM_BASE_URL:-http://llm:8080}
      LLM_MODEL: ${LLM_MODEL:-gemma-3-4b-it-qat-q4_0}
      LLM_VISION_ENABLED: ${LLM_VISION_ENABLED:-true}
    expose:
      - "8080"
    networks:
      - internal

  migrate:
    image: ${FLYWAY_IMAGE:-flyway/flyway:10-alpine}
    container_name: ${COMPOSE_PROJECT_NAME:-grooming-manager}_migrate
    restart: "no"
    depends_on:
      db:
        condition: service_healthy
    command:
      - -connectRetries=60
      - -baselineOnMigrate=true
      - migrate
    environment:
      FLYWAY_URL: ${FLYWAY_URL}
      FLYWAY_USER: ${POSTGRES_USER}
      FLYWAY_PASSWORD: ${POSTGRES_PASSWORD}
      FLYWAY_SCHEMAS: public
      FLYWAY_LOCATIONS: filesystem:/flyway/sql
    volumes:
      - ./migrations:/flyway/sql:ro
    networks:
      - internal

  keycloak:
    image: ${KEYCLOAK_IMAGE:-quay.io/keycloak/keycloak:latest}
    container_name: ${COMPOSE_PROJECT_NAME:-grooming-manager}_keycloak
    restart: unless-stopped
    command: ["start"]
    depends_on:
      db:
        condition: service_healthy
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_DB: postgres
      KC_DB_URL_HOST: db
      KC_DB_URL_PORT: 5432
      KC_DB_URL_DATABASE: ${KEYCLOAK_DB}
      KC_DB_USERNAME: ${KEYCLOAK_DB_USER}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
      KC_HTTP_ENABLED: "true"
      KC_PROXY_HEADERS: xforwarded
      KC_HOSTNAME: ${KEYCLOAK_PUBLIC_URL}
      KC_HTTP_RELATIVE_PATH: /auth
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
    expose:
      - "8080"
    networks:
      - internal

  db:
    image: postgres:16-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-grooming-manager}_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-grooming_manager}
      POSTGRES_USER: ${POSTGRES_USER:-grooming_manager}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      KEYCLOAK_DB: ${KEYCLOAK_DB:-keycloak}
      KEYCLOAK_DB_USER: ${KEYCLOAK_DB_USER:-keycloak}
      KEYCLOAK_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-grooming_manager} -d ${POSTGRES_DB:-grooming_manager}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

volumes:
  postgres_data:

networks:
  public:
  internal:
    internal: true
