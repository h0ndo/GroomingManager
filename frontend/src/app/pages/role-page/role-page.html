<section class="role-page">
  <p-card styleClass="role-page__card">
    <p class="eyebrow">{{ page().eyebrow }}</p>
    <div class="title-row">
      <h1>{{ page().title }}</h1>
      <p-tag [severity]="page().tagSeverity" [value]="page().roleLabel"></p-tag>
    </div>

    <p class="lead">{{ page().description }}</p>

    <div class="tiles">
      @for (item of page().items; track item) {
        <div class="tile">
          <span class="pi pi-check-circle" aria-hidden="true"></span>
          <span>{{ item }}</span>
        </div>
      }
    </div>

    <a pButton routerLink="/dashboard" severity="secondary" class="back-link">
      <span pButtonIcon class="pi pi-arrow-left"></span>
      <span pButtonLabel>Zurück zum Dashboard</span>
    </a>
  </p-card>
</section>
